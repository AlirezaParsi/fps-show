plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false  // نسخه مشخص برای Kotlin
}

android {
    compileSdk 33
    defaultConfig {
        applicationId "com.example.fpsmonitor"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        ndkBuild {
            path 'src/main/jni/Android.mk'
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}

externalNativeBuild {
    ndkBuild {
        arguments "NDK_APPLICATION_MK:=src/main/jni/Application.mk"
    }
}

// تعریف مخازن
repositories {
    google()
    mavenCentral()
}
